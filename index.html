<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Security Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8 font-sans">

    <div class="max-w-[1400px] mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold text-blue-400">🛡️ SOC Telemetry Stream</h1>
                <p class="text-gray-400">Real-time Risk Scoring </p>
            </div>
            <div id="status-ticker" class="text-xs font-mono text-gray-500 bg-gray-800 px-3 py-2 rounded border border-gray-700">
                Syncing...
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg shadow-xl border border-gray-700 overflow-hidden">
            <table class="w-full text-left text-sm table-fixed">
                <thead class="bg-gray-900 text-gray-400 uppercase text-xs font-semibold">
                    <tr>
                        <th class="px-4 py-3 w-24">Event ID</th>
                        <th class="px-4 py-3 w-32">Risk Score</th>
                        <th class="px-4 py-3 w-28">Verdict</th>
                        <th class="px-4 py-3 w-40">Context</th>
                        <th class="px-4 py-3 w-1/3">Raw Keystrokes</th>
                        <th class="px-4 py-3 w-1/3">AI Reasoning</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-gray-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
    // 💡 The "High-Water Mark" Strategy
    let historicalIds = new Set();
    let isInitialized = false;
    
    // NEW: We maintain a local array to strictly control the display order
    let displayLogs = [];

    async function fetchAlerts() {
        try {
            const url = `http://localhost:7071/api/get_alerts?cachebust=${Date.now()}`;
            const response = await fetch(url);
            const data = await response.json();
            
            const tableBody = document.getElementById('table-body');
            
            // 1. On the very first run, mark everything currently in the DB as "Historical"
            if (!isInitialized) {
                data.forEach(log => historicalIds.add(log.ID));
                isInitialized = true;
                console.log(`Initialized: Ignoring ${historicalIds.size} old logs.`);
                // Render the empty state on start
                tableBody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-gray-500 italic text-lg">Awaiting fresh telemetry... <br><span class="text-xs uppercase tracking-widest opacity-50">Monitoring Database for new IDs</span></td></tr>';
                return;
            }

            // 2. Filter: Only keep logs whose ID is NOT in our historical list
            const freshData = data.filter(log => !historicalIds.has(log.ID));

            if (freshData.length > 0) {
                // Mark the new ones as seen so we don't duplicate them next cycle
                freshData.forEach(log => historicalIds.add(log.ID));
                
                // 3. FORCE ORDER: Prepend the new logs to the top of our master display list
                displayLogs = [...freshData, ...displayLogs];
            }

            // Update ticker
            document.getElementById('status-ticker').innerText = 
                `SYNCED: ${new Date().toLocaleTimeString()} | Total Displayed: ${displayLogs.length}`;

            // If we still have nothing to show, exit
            if (displayLogs.length === 0) return;

            // Clear the table before re-rendering
            tableBody.innerHTML = ''; 

            // 4. Render the strictly ordered list
            displayLogs.forEach(log => {
                const isMalicious = log.Verdict === 'MALICIOUS';
                const score = parseFloat(log.Score) || 0;
                let color = 'bg-green-500';
                if (score > 0.4) color = 'bg-yellow-500';
                if (score > 0.7) color = 'bg-red-500';

                const row = document.createElement('tr');
                row.className = isMalicious ? 'bg-red-900/10 border-l-4 border-red-600' : 'border-l-4 border-transparent';
                
                row.innerHTML = `
                    <td class="px-4 py-4 font-mono text-gray-500 text-[10px]">#${log.ID}</td>
                    <td class="px-4 py-4">
                        <div class="flex items-center gap-2">
                            <span class="font-bold w-8 text-xs">${score.toFixed(2)}</span>
                            <div class="flex-grow h-1.5 bg-gray-900 rounded-full overflow-hidden">
                                <div class="${color} h-full" style="width: ${score * 100}%"></div>
                            </div>
                        </div>
                    </td>
                    <td class="px-4 py-4">
                        <span class="px-2 py-1 rounded text-[10px] font-bold border ${isMalicious ? 'border-red-500 text-red-500' : 'border-green-500 text-green-500'}">
                            ${log.Verdict}
                        </span>
                    </td>
                    <td class="px-4 py-4 text-xs">
                        <div class="text-blue-400 font-bold">${log.User}</div>
                        <div class="text-yellow-500 font-mono">${log.Application}</div>
                    </td>
                    <td class="px-4 py-4 font-mono text-[11px] text-gray-400">
                        <div class="truncate max-w-xs">> ${log.Keystrokes}</div>
                    </td>
                    <td class="px-4 py-4 text-xs text-gray-300 leading-relaxed">${log.Reason}</td>
                `;
                tableBody.appendChild(row);
            });
        } catch (err) {
            document.getElementById('status-ticker').innerText = "OFFLINE - Check API Port";
        }
    }

    setInterval(fetchAlerts, 2000);
    fetchAlerts();
</script>
</body>
</html>
